volumes:
  cutout_local_postgres_data: {}
  cutout_local_postgres_data_backups: {}

services:
  django: &django
    build:
      context: .
      dockerfile: ./compose/local/django/Dockerfile
    depends_on:
      - postgres
      - redis
      - mailhog
    volumes:
      - .:/app:z
      - ./data:/data:z

    env_file:
      - ./.envs/.local/.django
      - ./.envs/.local/.postgres
    ports:
      - '80:8000'
    command: /start

  postgres:
    build:
      context: .
      dockerfile: ./compose/production/postgres/Dockerfile
    volumes:
      - cutout_local_postgres_data:/var/lib/postgresql/data
      - cutout_local_postgres_data_backups:/backups
    env_file:
      - ./.envs/.local/.postgres
    ports:
      - '5432:5432'

  docs:
    build:
      context: .
      dockerfile: ./compose/local/docs/Dockerfile
    env_file:
      - ./.envs/.local/.django
    volumes:
      - ./docs:/docs:z
      - ./config:/app/config:z
      - ./cutout:/app/cutout:z
    ports:
      - '9000:9000'
    command: /start-docs

  mailhog:
    image: mailhog/mailhog:v1.0.0
    container_name: cutout_local_mailhog
    ports:
      - "8025:8025"

  redis:
    image: redis:6

  celeryworker:
    <<: *django
    depends_on:
      - django
    ports: []      
    command: /start-celeryworker

  celerybeat:
    <<: *django
    depends_on:
      - django
    ports: []
    command: /start-celerybeat

  flower:
    <<: *django
    ports:
      - '5555:5555'
    command: /start-flower
